name: Publish Jenkins image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - plugins.txt
      - .github/workflows/build.yaml
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to JFrog
        uses: docker/login-action@v3
        with:
          registry: jfrog.it-academy.by
          username: sa
          password: ${{ secrets.JFROG_PASS }}

      - name: Build and publish Jenkins image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            jfrog.it-academy.by/public/jenkins-ci:antonzhdanko
            jfrog.it-academy.by/public/jenkins-ci:antonzhdanko-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
