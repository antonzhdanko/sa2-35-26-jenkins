apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jenkins-homework.fullname" . }}
  labels:
    {{- include "jenkins-homework.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "jenkins-homework.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jenkins-homework.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/jcasc: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "jenkins-homework.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: jenkins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: JAVA_OPTS
              value: -Djenkins.install.runSetupWizard=false
            - name: CASC_JENKINS_CONFIG
              value: /var/jenkins_home/casc_configs/jenkins.yaml
            - name: JENKINS_ADMIN_ID
              value: {{ .Values.admin.username | quote }}
            - name: JENKINS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "admin.existingSecret is required" .Values.admin.existingSecret }}
                  key: {{ .Values.admin.passwordKey }}
            - name: JENKINS_VIEWER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "viewer.existingSecret is required" .Values.viewer.existingSecret }}
                  key: {{ .Values.viewer.passwordKey }}
            - name: JENKINS_AUTOMATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "automation.existingSecret is required" .Values.automation.existingSecret }}
                  key: {{ .Values.automation.passwordKey }}
            - name: JENKINS_SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: {{ required "notification.slackExistingSecret is required" .Values.notification.slackExistingSecret }}
                  key: {{ .Values.notification.slackUrlKey }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
            - name: agent
              containerPort: {{ .Values.service.agentPort }}
          startupProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 20
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: jcasc
              mountPath: /var/jenkins_home/casc_configs/jenkins.yaml
              subPath: jenkins.yaml
              readOnly: true
      volumes:
        - name: jenkins-home
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "jenkins-homework.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: jcasc
          configMap:
            name: {{ include "jenkins-homework.fullname" . }}-jcasc
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
