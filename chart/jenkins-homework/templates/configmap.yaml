apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jenkins-homework.fullname" . }}-jcasc
  labels:
    {{- include "jenkins-homework.labels" . | nindent 4 }}
data:
  jenkins.yaml: |
    jenkins:
      systemMessage: {{ .Values.jenkins.systemMessage | quote }}
      numExecutors: {{ .Values.jenkins.numExecutors }}
      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "${JENKINS_ADMIN_ID}"
              password: "${JENKINS_ADMIN_PASSWORD}"
            - id: {{ .Values.viewer.username | quote }}
              name: "Homework Read Only User"
              password: "${JENKINS_VIEWER_PASSWORD}"
            - id: {{ .Values.automation.username | quote }}
              name: "GitHub Actions API User"
              password: "${JENKINS_AUTOMATION_PASSWORD}"
      authorizationStrategy:
        globalMatrix:
          entries:
            - user:
                name: "${JENKINS_ADMIN_ID}"
                permissions:
                  - "Overall/Administer"
            - user:
                name: {{ .Values.viewer.username | quote }}
                permissions:
                  - "Overall/Read"
                  - "Job/Read"
            - user:
                name: {{ .Values.automation.username | quote }}
                permissions:
                  - "Overall/Read"
                  - "Job/Read"
                  - "Job/Build"
      {{- if .Values.jenkins.kubernetes.enabled }}
      clouds:
        - kubernetes:
            name: kubernetes
            namespace: {{ .Release.Namespace | quote }}
            jenkinsUrl: {{ printf "http://%s:%v" (include "jenkins-homework.fullname" .) .Values.service.httpPort | quote }}
            jenkinsTunnel: {{ printf "%s:%v" (include "jenkins-homework.fullname" .) .Values.service.agentPort | quote }}
            containerCapStr: {{ .Values.jenkins.kubernetes.containerCap | quote }}
            maxRequestsPerHostStr: {{ .Values.jenkins.kubernetes.maxRequestsPerHost | quote }}
            skipTlsVerify: true
      {{- end }}
    unclassified:
      location:
        adminAddress: {{ .Values.admin.email | quote }}
        url: {{ .Values.jenkins.url | quote }}
    jobs:
      - script: |
          job('user-existence-check') {
            description('Checks whether a requested local user exists in /etc/passwd')
            parameters {
              stringParam('USERNAME', 'root', 'Linux user name to check')
            }
            logRotator {
              numToKeep(30)
            }
            steps {
              shell('''#!/bin/sh
          set -eu

          case "^${USERNAME}" in
            ''|*[!A-Za-z0-9._-]*)
              echo "Invalid user name: only letters, digits, dot, underscore and dash are allowed."
              exit 2
              ;;
          esac

          if awk -F: -v username="^${USERNAME}" '$1 == username { found=1 } END { exit !found }' /etc/passwd; then
            echo "User '^${USERNAME}' exists in /etc/passwd."
          else
            echo "User '^${USERNAME}' does not exist in /etc/passwd."
          fi
          ''')
            }
          }
      - script: |
          job('github-main-webhook') {
            description('Clones the homework repository after GitHub pushes to the main branch')
            scm {
              git {
                remote {
                  url({{ .Values.jobs.repositoryUrl | quote }})
                }
                branch({{ printf "*/%s" .Values.jobs.repositoryBranch | quote }})
              }
            }
            triggers {
              githubPush()
            }
            logRotator {
              numToKeep(30)
            }
            steps {
              shell('''#!/bin/sh
          set -eu
          echo "Webhook build for branch: ^${GIT_BRANCH}"
          echo "Commit: ^${GIT_COMMIT}"
          git log -1 --pretty='format:Author: %an%nSubject: %s'
          ''')
            }
          }
      - script: |
          job('belarus-daily-info') {
            description('Daily Belarus holiday check and official exchange rates')
            triggers {
              cron('H H * * *')
            }
            logRotator {
              numToKeep(30)
            }
            steps {
              shell('''#!/bin/sh
          set -eu

          TODAY="$(date +%F)"
          YEAR="$(date +%Y)"

          echo "Date: ^${TODAY}"
          echo "=== Belarus holiday check ==="

          HOLIDAYS="$(curl --fail --silent --show-error \
            "https://tallyfy.com/national-holidays/api/BY/^${YEAR}.json")"
          HOLIDAY_NAME="$(printf '%s' "^${HOLIDAYS}" | jq -r \
            --arg today "^${TODAY}" \
            '.holidays[]? | select(.date == $today) | .name' | head -n 1)"

          if [ -n "^${HOLIDAY_NAME}" ]; then
            echo "Today is a public holiday in Belarus: ^${HOLIDAY_NAME}"
          else
            echo "Today is not a public holiday in Belarus."
          fi

          echo "=== National Bank of Belarus exchange rates ==="
          RATES="$(curl --fail --silent --show-error \
            'https://api.nbrb.by/exrates/rates?periodicity=0')"

          for CODE in USD EUR RUB; do
            printf '%s' "^${RATES}" | jq -r --arg code "^${CODE}" \
              '.[] | select(.Cur_Abbreviation == $code) | "\\(.Cur_Scale) \\(.Cur_Abbreviation) = \\(.Cur_OfficialRate) BYN"'
          done
          ''')
            }
          }
